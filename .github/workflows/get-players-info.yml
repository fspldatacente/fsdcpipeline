# .github/workflows/get-players-info.yml
name: Get Players Info (One-Time)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "YES" to confirm running this one-time function'
        required: true
        default: ''

jobs:
  get-players-info:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Check confirmation
      run: |
        if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
          echo "❌ Confirmation required. Type 'YES' to run this one-time function."
          exit 1
        fi
    
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Get Players Info
      env:
        TIDB_HOST: ${{ secrets.TIDB_HOST }}
        TIDB_PORT: ${{ secrets.TIDB_PORT }}
        TIDB_USER: ${{ secrets.TIDB_USER }}
        TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
      run: node src/fantasy/get-players-info.js