name: Process Round Fantasy Stats

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Processing mode'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - full
      round:
        description: 'Round number to process (leave empty for ALL rounds)'
        required: false
        type: number

jobs:
  process-round-fantasy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Process Round Fantasy Stats
      env:
        TIDB_HOST: ${{ secrets.TIDB_HOST }}
        TIDB_PORT: ${{ secrets.TIDB_PORT }}
        TIDB_USER: ${{ secrets.TIDB_USER }}
        TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
      run: |
        echo "🚀 Starting Process Round Fantasy Stats"
        echo "Mode: ${{ github.event.inputs.mode }}"
        if [ -n "${{ github.event.inputs.round }}" ]; then
          echo "Target round: ${{ github.event.inputs.round }} (OVERRIDE)"
          node src/fantasy/process-round-fantasy-stats.js ${{ github.event.inputs.mode }} ${{ github.event.inputs.round }}
        else
          echo "Target round: ALL rounds"
          node src/fantasy/process-round-fantasy-stats.js ${{ github.event.inputs.mode }}
        fi
        echo "Started at: $(date)"
        echo "Completed at: $(date)"